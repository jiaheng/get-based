# GitHub Actions release workflow for the Electron desktop app.
#
# Trigger: push a tag like `v1.20.3` and every job below builds a signed,
# published release artifact for that platform. electron-builder generates
# the `latest{-linux,-mac}.yml` feed electron-updater reads at runtime.
#
# Signing (all optional — if a secret is missing, that platform builds an
# UNSIGNED artifact, which still works for testing but not for macOS
# Gatekeeper / Windows SmartScreen on end-user machines):
#   macOS:   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID,
#            CSC_LINK (Developer ID Application .p12 base64), CSC_KEY_PASSWORD
#   Windows: CSC_LINK (code-signing .pfx base64), CSC_KEY_PASSWORD
#
# GitHub token is automatic — GITHUB_TOKEN has `contents: write` via the
# workflow-level `permissions:` block, enough for electron-builder to
# upload assets to the tagged release.

name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger: useful for dry-running the build without cutting a tag.
  # electron-builder still needs a version; it reads it from package.json.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache electron-builder's downloaded Electron binaries + per-platform
      # helper tooling so reruns on the same runner don't re-fetch them.
      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron-builder
          key: eb-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build and publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish ${{ github.event_name == 'push' && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish (macOS)
        if: matrix.os == 'macos-latest'
        # When CSC_LINK isn't set, electron-builder interprets the empty
        # string as a cert file path and fails with "not a file". Only
        # export signing env vars when the secrets are non-empty; fall
        # back to CSC_IDENTITY_AUTO_DISCOVERY=false for unsigned builds
        # that still work for internal testing.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -n "$CSC_LINK_SECRET" ]; then
            export CSC_LINK="$CSC_LINK_SECRET"
            export CSC_KEY_PASSWORD="$CSC_KEY_PASSWORD_SECRET"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          if [ -n "$APPLE_ID_SECRET" ]; then
            export APPLE_ID="$APPLE_ID_SECRET"
            export APPLE_APP_SPECIFIC_PASSWORD="$APPLE_APP_SPECIFIC_PASSWORD_SECRET"
            export APPLE_TEAM_ID="$APPLE_TEAM_ID_SECRET"
          fi
          npx electron-builder --mac --publish ${{ github.event_name == 'push' && 'always' || 'never' }}

      - name: Build and publish (Windows)
        if: matrix.os == 'windows-latest'
        # Same pattern as macOS — skip signing when no cert is available
        # instead of feeding electron-builder an empty CSC_LINK.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK_WIN }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD_WIN }}
        run: |
          if [ -n "$CSC_LINK_SECRET" ]; then
            export CSC_LINK="$CSC_LINK_SECRET"
            export CSC_KEY_PASSWORD="$CSC_KEY_PASSWORD_SECRET"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --win --publish ${{ github.event_name == 'push' && 'always' || 'never' }}

      # On workflow_dispatch runs we upload artifacts but don't publish to
      # a release (no tag yet). Gives us a way to dry-run the whole pipeline
      # before cutting an actual release tag.
      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: getbased-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.yml
          if-no-files-found: ignore
