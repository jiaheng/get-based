# Nginx configuration for serving the static getbased site.
# Copy the built/static repository contents to /usr/share/nginx/html, or update
# the `root` directive below to the directory containing index.html.

worker_processes auto;

pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob: https://umami-iota-olive.vercel.app https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https: wss: http://localhost:* http://127.0.0.1:* ws://localhost:* ws://*.onion http://*.onion; img-src 'self' data: blob:; worker-src 'self' blob:; manifest-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Onion-Location "http://iobqafpywmncin7m2wpvbemouvulaeb7jnvtvugxnru4gpneushb5jyd.onion$uri$is_args$args" always;
    add_header Link '</.well-known/mcp.json>; rel="service-desc"; type="application/json"; title="MCP server card", </.well-known/agent-skills/index.json>; rel="service-desc"; type="application/json"; title="Agent Skills index"' always;

    location = / {
      try_files /index.html =404;
    }

    # Preserve the existing Vercel /app route by serving the static app shell.
    location = /app {
      try_files /index.html =404;
    }

    location = /app/ {
      try_files /index.html =404;
    }

    # This static site does not require a broad client-side routing fallback.
    # Unknown asset paths should 404 instead of returning the app shell.
    location / {
      try_files $uri =404;
    }
  }
}
